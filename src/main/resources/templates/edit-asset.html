<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Edit Asset</title>
<style>
    * { margin:0; padding:0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; display: flex; }
    .sidebar { width: 260px; background: #1a2c3e; color: white; height: 100vh; position: fixed; }
    .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; }
    .sidebar a:hover { background: #2ecc71; }
    .main { margin-left: 260px; padding: 20px; width: 100%; }
    .form-card { background: white; padding: 30px; border-radius: 12px; max-width: 600px; margin: 0 auto; }
    input, select { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 6px; }
    button { background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    .error { color: #e74c3c; font-size: 14px; }
</style></head>
<body>
<div class="sidebar"><h2 style="padding:20px">📱 Airtel Inventory</h2><a href="/">Dashboard</a><a href="/assets">Assets</a><a href="/employees">Employees</a><a href="/assignments">Assignments</a><a href="/reports">Reports</a></div>
<div class="main">
    <div class="form-card">
        <h2>Edit Asset</h2>
        <form th:action="@{/assets/update/{id}(id=${asset.id})}" method="post" th:object="${asset}">
            <label>Device Name</label><input type="text" th:field="*{deviceName}"/>
            <div class="error" th:if="${#fields.hasErrors('deviceName')}" th:errors="*{deviceName}"></div>
            <label>Serial Number</label><input type="text" th:field="*{serialNumber}"/>
            <div class="error" th:if="${#fields.hasErrors('serialNumber')}" th:errors="*{serialNumber}"></div>
            <label>Device Type</label><select th:field="*{deviceType}"><option th:each="t : ${deviceTypes}" th:value="${t}" th:text="${t}"></option></select>
            <label>Brand</label><input type="text" th:field="*{brand}"/>
            <label>Model</label><input type="text" th:field="*{model}"/>
            <label>Purchase Date</label><input type="date" th:field="*{purchaseDate}"/>
            <label>Condition</label><select th:field="*{assetCondition}"><option th:each="c : ${conditions}" th:value="${c}" th:text="${c}"></option></select>
            <button type="submit">Update Asset</button>
        </form>
    </div>
</div>
</body>
</html>
