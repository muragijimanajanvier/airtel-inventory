<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtel Inventory - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 440px;
        }
        .login-card {
            background: rgba(255,255,255,0.98);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            transition: all 0.3s ease;
        }
        .login-card h1 {
            color: #1a2c3e;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        .login-card .subtitle {
            color: #5d6e7e;
            font-size: 14px;
            margin-bottom: 24px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 12px;
        }
        .demo-credentials {
            background: #e9f5ff;
            border-left: 4px solid #2ecc71;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #1e2a3a;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .demo-credentials .cred-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .demo-credentials strong {
            color: #2c3e50;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.2s;
            background: #f8fafc;
        }
        .input-group input:focus {
            outline: none;
            border-color: #2ecc71;
            background: white;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.1);
        }
        button {
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        button:hover {
            background: #27ae60;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(46,204,113,0.3);
        }
        .error-message {
            background: #fff5f5;
            color: #c0392b;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            border: 1px solid #fcd4d4;
        }
        .logout-message {
            background: #e8f8f0;
            color: #1e7b48;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            border: 1px solid #b8e0c8;
        }
        .footer-brand {
            margin-top: 24px;
            font-size: 11px;
            color: #8a9bb0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>📱 Airtel Inventory</h1>
        <div class="subtitle">Sign in to continue</div>

        <!-- SysAdmin credentials – stacked vertically -->
        <div class="demo-credentials">
            <div class="cred-row">
                <span>🔐 <strong>SysAdmin credentials:</strong></span>
            </div>
            <div class="cred-row">
                <span>👤 Username: <strong>24RP04809</strong></span>
            </div>
            <div class="cred-row">
                <span>🔑 Password: <strong>24RP04727</strong></span>
            </div>
        </div>

        <div th:if="${param.error}" class="error-message">
            ❌ Invalid username or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="logout-message">
            ✅ You have been logged out successfully.
        </div>

        <form method="post" action="/login">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit">Login →</button>
        </form>
        <div class="footer-brand">
            @copy Janvier & Ange Airtel Digital & Social Transformation
        </div>
    </div>
</div>
</body>
</html>
