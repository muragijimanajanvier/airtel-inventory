<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Airtel - Assets Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: white;
            padding: 20px;
        }
        .report-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #1a2c3e;
            padding-bottom: 15px;
        }
        .header h1 {
            color: #1a2c3e;
            font-size: 28px;
        }
        .header h3 {
            color: #2ecc71;
            margin-top: 5px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #1a2c3e;
            color: white;
        }
        tr:nth-child(even) {
            background: #f9f9f9;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #777;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px auto;
        }
        .print-btn, .back-btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            text-align: center;
        }
        .print-btn {
            background: #3498db;  /* Blue background */
            color: white;
        }
        .print-btn:hover {
            background: #2980b9;
        }
        .back-btn {
            background: #95a5a6;
            color: white;
        }
        .back-btn:hover {
            background: #7f8c8d;
        }
        @media print {
            .button-group {
                display: none;
            }
            body {
                padding: 0;
                margin: 0;
            }
            th {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-available { background: #27ae60; color: white; }
        .badge-assigned { background: #e67e22; color: white; }
    </style>
</head>
<body>
<div class="report-container">
    <div class="header">
        <h1>📱 Airtel Equipment Inventory Report</h1>
        <h3>Assets Report</h3>
    </div>
    <div class="info">
        <span>Generated: <span th:text="${currentDateTime}"></span></span>
        <span>Total Records: <span th:text="${totalRecords}"></span></span>
    </div>
    <div th:if="${deviceTypeFilter}" class="info" style="color:#2ecc71;">
        Filter by Device Type: <span th:text="${deviceTypeFilter}"></span>
    </div>
    <div th:if="${statusFilter}" class="info" style="color:#2ecc71;">
        Filter by Status: <span th:text="${statusFilter}"></span>
    </div>
    <table>
        <thead>
            <tr><th>Name</th><th>Serial Number</th><th>Type</th><th>Brand</th><th>Model</th><th>Condition</th><th>Status</th></tr>
        </thead>
        <tbody>
            <tr th:each="asset : ${assets}">
                <td th:text="${asset.deviceName}"></td>
                <td th:text="${asset.serialNumber}"></td>
                <td th:text="${asset.deviceType}"></td>
                <td th:text="${asset.brand}"></td>
                <td th:text="${asset.model}"></td>
                <td th:text="${asset.assetCondition}"></td>
                <td>
                    <span class="badge" th:classappend="${asset.status?.name() == 'AVAILABLE' ? 'badge-available' : 'badge-assigned'}" th:text="${asset.status}"></span>
                </td>
            </tr>
        </tbody>
    </table>
    <div class="footer">
        Generated by Airtel Inventory Management System
    </div>
    <div class="button-group">
        <button class="print-btn" onclick="window.print();">🖨️ Print Report</button>
        <a href="/reports" class="back-btn">⬅️ Back to Reports</a>
    </div>
</div>
<script>
    // Auto open print dialog on page load
    window.onload = function() {
        window.print();
    };
</script>
</body>
</html>
