<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assets</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; }
        .sidebar { width: 260px; background: #1a2c3e; color: white; height: 100vh; position: fixed; }
        .sidebar a { display: block; padding: 12px 20px; color: #ecf0f1; text-decoration: none; }
        .sidebar a:hover { background: #2ecc71; }
        .main { margin-left: 260px; padding: 20px; width: 100%; }
        .btn { background: #2ecc71; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; margin: 10px 0; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #1a2c3e; color: white; }
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-available { background: #27ae60; color: white; }
        .badge-assigned { background: #e67e22; color: white; }
        .badge-unknown { background: #95a5a6; color: white; }
        .message { background: #d4edda; color: #155724; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        .action-btn { margin: 0 4px; text-decoration: none; padding: 4px 8px; border-radius: 4px; }
        .edit-btn { background: #3498db; color: white; }
        .delete-btn { background: #e74c3c; color: white; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2 style="padding:20px">📱 Airtel Inventory</h2>
    <a href="/">Dashboard</a><a href="/assets">Assets</a><a href="/employees">Employees</a><a href="/assignments">Assignments</a><a href="/reports">Reports</a>
</div>
<div class="main">
    <h2>Asset Management</h2>
    <a href="/assets/add" class="btn">+ Add New Asset</a>
    <div th:if="${message}" class="message" th:text="${message}"></div>
    <table>
        <thead>
            <tr><th>Name</th><th>Serial</th><th>Type</th><th>Brand</th><th>Condition</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
            <tr th:each="asset : ${assets}">
                <td th:text="${asset.deviceName}"></td>
                <td th:text="${asset.serialNumber}"></td>
                <td th:text="${asset.deviceType}"></td>
                <td th:text="${asset.brand}"></td>
                <td th:text="${asset.assetCondition}"></td>
                <td>
                    <!-- Null-safe status badge -->
                    <span class="badge" 
                          th:classappend="${asset.status != null and asset.status.name() == 'AVAILABLE' ? 'badge-available' : (asset.status != null and asset.status.name() == 'ASSIGNED' ? 'badge-assigned' : 'badge-unknown')}" 
                          th:text="${asset.status != null ? asset.status : 'UNKNOWN'}"></span>
                </td>
                <td>
                    <a th:href="@{/assets/edit/{id}(id=${asset.id})}" class="action-btn edit-btn">✏️ Edit</a>
                    <a th:href="@{/assets/delete/{id}(id=${asset.id})}" class="action-btn delete-btn" onclick="return confirm('Are you sure?')">🗑️ Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
